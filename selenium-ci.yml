name: Selenium CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run regression suite in headless Chrome
        shell: powershell
        working-directory: ${{ github.workspace }}
        run: mvn -B clean test -PRegression -Dbrowser=chromeheadless

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-reports
          path: |
            ${{ github.workspace }}/reports
            ${{ github.workspace }}/target/surefire-reports
            ${{ github.workspace }}/test-output