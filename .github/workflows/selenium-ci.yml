name: Selenium CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: "Recreate expected S: workspace path"
        shell: powershell
        run: |
          cmd /c subst S: "$env:RUNNER_TEMP"
          New-Item -ItemType Directory -Force -Path "S:\eclipse" | Out-Null
          if (Test-Path "S:\eclipse\SeleniumFramework") {
            Remove-Item -Recurse -Force "S:\eclipse\SeleniumFramework"
          }
          New-Item -ItemType Junction -Path "S:\eclipse\SeleniumFramework" -Target "$env:GITHUB_WORKSPACE" | Out-Null

      - name: Run regression suite in headless Chrome
        shell: powershell
        working-directory: "S:\\eclipse\\SeleniumFramework"
        run: mvn -B clean test -PRegression -Dbrowser=chromeheadless

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-reports
          path: |
            S:\eclipse\SeleniumFramework\reports
            S:\eclipse\SeleniumFramework\target\surefire-reports
            S:\eclipse\SeleniumFramework\test-output
